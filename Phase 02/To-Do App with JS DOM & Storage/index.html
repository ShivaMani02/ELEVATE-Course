<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elevate - Premium To-Do</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-theme">
    <div class="app-background"></div>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8 col-xl-7">
                <div class="todo-card p-4 p-md-5">
                    
                    <!-- Header -->
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h1 class="app-title m-0">My Tasks</h1>
                        <button id="themeToggleBtn" class="btn btn-icon theme-btn" aria-label="Toggle Theme">
                            <i class="bi bi-moon-stars-fill"></i>
                        </button>
                    </div>

                    <!-- Input Section -->
                    <form id="todoForm" class="todo-input-group mb-5">
                        <div class="input-group input-group-lg shadow-sm rounded-4 overflow-hidden position-relative">
                            <input type="text" id="taskInput" class="form-control border-0 px-4" placeholder="What needs to be done?" required autocomplete="off">
                            <input type="date" id="dueDateInput" class="form-control border-0 px-3 date-input" title="Set due date">
                            <button class="btn btn-primary px-4 fw-bold" type="submit" id="addBtn">
                                <span>Add</span> <i class="bi bi-plus-lg ms-1"></i>
                            </button>
                        </div>
                    </form>

                    <!-- Stats & Filters -->
                    <div class="d-flex flex-wrap justify-content-between align-items-center mb-3 filter-container">
                        <div class="task-stats text-muted fw-medium text-sm">
                            <span id="tasksLeftCount">0</span> tasks left
                        </div>
                        <ul class="nav nav-pills custom-pills task-filters" id="filters">
                            <li class="nav-item">
                                <a class="nav-link active" href="#" data-filter="all">All</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#" data-filter="active">Active</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#" data-filter="completed">Completed</a>
                            </li>
                        </ul>
                        <button id="clearCompletedBtn" class="btn btn-link text-danger text-decoration-none btn-sm fw-medium">
                            Clear completed
                        </button>
                    </div>

                    <!-- Search -->
                    <div class="search-box mb-4 position-relative">
                        <i class="bi bi-search position-absolute search-icon text-muted"></i>
                        <input type="text" id="searchInput" class="form-control bg-light border-0 rounded-pill" placeholder="Search tasks...">
                    </div>

                    <!-- Task List Container -->
                    <div class="task-list-container custom-scrollbar">
                        <ul id="taskList" class="list-group list-group-flush">
                            <!-- Tasks will be dynamically injected here -->
                        </ul>
                        
                        <!-- Empty State -->
                        <div id="emptyState" class="empty-state text-center py-5 d-none">
                            <div class="empty-icon mb-3">
                                <i class="bi bi-clipboard2-check text-primary opacity-50 display-1"></i>
                            </div>
                            <h4 class="fw-semibold text-secondary">All caught up!</h4>
                            <p class="text-muted mb-0">You have no tasks here. Enjoy your day.</p>
                        </div>
                    </div>
                    
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Task Modal -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow-lg">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Edit Task</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editTaskId">
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-medium">Task Name</label>
                        <input type="text" class="form-control form-control-lg bg-light border-0 rounded-3" id="editTaskName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-medium">Due Date</label>
                        <input type="date" class="form-control form-control-lg bg-light border-0 rounded-3" id="editDueDate">
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary rounded-pill px-4" id="saveEditBtn">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
